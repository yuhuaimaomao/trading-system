# Pre-commit hooks — 提交前自动检查
# 安装: pip install pre-commit && pre-commit install
# 跳过: git commit --no-verify (紧急情况，CI 会补拦)

repos:
  # ══════════════════════════════════════════════
  # 第1级: 基础卫生 — 所有文件强制执行 ★现在生效★
  # ══════════════════════════════════════════════

  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v5.0.0
    hooks:
      - id: trailing-whitespace
      - id: end-of-file-fixer
      - id: check-yaml
      - id: check-toml
      - id: check-merge-conflict          # 未解决的合并冲突
      - id: debug-statements              # breakpoint() / pdb
      - id: detect-private-key            # 私钥泄露
      - id: check-added-large-files
        args: ['--maxkb=500']

  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.11.0
    hooks:
      - id: ruff
        args: ['--fix', '--select=E,F,W,I,N,B,SIM', '--line-length=120']
      - id: ruff-format

  # ══════════════════════════════════════════════
  # 第2级: 魔法数字 — 只检查变更行 ★现在生效★
  # ══════════════════════════════════════════════

  - repo: local
    hooks:
      - id: no-magic-numbers
        name: 禁止魔法数字（仅检查变更行）
        entry: python ops/pre_commit/check_magic_numbers.py
        language: python
        files: '^(strategy|trade|review|audit|stock|data|system)/.*\.py$'
        pass_filenames: true
        additional_dependencies: []

      - id: no-hardcoded-config
        name: 禁止新增配置硬编码
        entry: python ops/pre_commit/check_hardcoded_config.py
        language: python
        files: '^(strategy|trade|review|audit|stock|data|system)/.*\.py$'
        pass_filenames: true

  # ══════════════════════════════════════════════
  # 第2.5级: 测试检查 — 运行快速测试
  # ══════════════════════════════════════════════

  - repo: local
    hooks:
      - id: pytest-quick
        name: 快速测试检查
        entry: python -m pytest tests/ -m "not e2e and not qmt and not slow" --tb=short -x --no-header -q
        language: system
        pass_filenames: false
        always_run: true
        # 通过 pip install pytest pytest-cov pytest-timeout 安装依赖
        # 跳过: SKIP=pytest-quick git commit (紧急情况)

  # ══════════════════════════════════════════════
  # 第3级: 架构规则 — 仅新文件 ★现在生效★
  # ══════════════════════════════════════════════

  - repo: local
    hooks:
      - id: file-size-new
        name: 新文件不超过 400 行
        entry: python ops/pre_commit/check_file_size_new.py
        language: python
        pass_filenames: true

      - id: domain-purity-new
        name: 新文件禁止 domain 依赖 IO
        entry: python ops/pre_commit/check_domain_purity_new.py
        language: python
        files: '^(strategy|trade|review|audit|stock|data|system)/.*\.py$'
        pass_filenames: true

      - id: naming-conventions
        name: 命名规范检查（全量，snake_case/PascalCase/UPPER_SNAKE）
        entry: python ops/pre_commit/check_naming_conventions.py
        language: python
        files: '\.py$'
        pass_filenames: true
